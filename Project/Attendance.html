<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Attendance | Smart Student Management System</title>

    <link rel="stylesheet" href="css/dashboard.css">
    <link rel="stylesheet" href="css/attendance.css">

</head>

<body>

<div class="container">

    <!-- Sidebar -->

    <div class="sidebar">

        <div class="logo">
            🎓 SMS
        </div>

        <ul>

            <li>
                <a href="dashboard.html">🏠 Dashboard</a>
            </li>

            <li>
                <a href="students.html">👨‍🎓 Students</a>
            </li>

            <li class="active">
                <a href="attendance.html">📅 Attendance</a>
            </li>

            <li>
                <a href="marks.html">📚 Marks</a>
            </li>

            <li>
                <a href="certificate.html">🏆 Certificates</a>
            </li>

            <li>
                <a href="reports.html">📊 Reports</a>
            </li>

            <li>
                <a href="settings.html">⚙ Settings</a>
            </li>

            <li id="logout">
                🚪 Logout
            </li>

        </ul>

    </div>

    <!-- Main -->

    <div class="main">

        <header>

            <h1>Attendance Management</h1>

            <div class="profile">

                <button id="themeBtn">🌙</button>

            </div>

        </header>

        <!-- Top Controls -->

        <div class="attendance-header">

            <div>

                <h2>Today's Attendance</h2>

                <p id="todayDate"></p>

            </div>

            <div class="attendance-buttons">

                <button id="presentAll" class="btn green">
                    ✔ Mark All Present
                </button>

                <button id="absentAll" class="btn red">
                    ✖ Mark All Absent
                </button>

                <button id="saveAttendance" class="btn">
                    💾 Save Attendance
                </button>

            </div>

        </div>

        <!-- Search -->

        <div class="search">

            <input
                type="text"
                id="searchAttendance"
                placeholder="Search Student..."
            >

        </div>

        <!-- Attendance Summary -->

        <div class="cards">

            <div class="card blue">

                <h2>Total Students</h2>

                <h1 id="totalStudents">
                    0
                </h1>

            </div>

            <div class="card green">

                <h2>Present</h2>

                <h1 id="presentStudents">
                    0
                </h1>

            </div>

            <div class="card red">

                <h2>Absent</h2>

                <h1 id="absentStudents">
                    0
                </h1>

            </div>

            <div class="card orange">

                <h2>Attendance %</h2>

                <h1 id="attendancePercentage">
                    0%
                </h1>

            </div>

        </div>

        <!-- Attendance Table -->

        <div class="table">

            <table>

                <thead>

                <tr>

                    <th>ID</th>

                    <th>Name</th>

                    <th>Course</th>

                    <th>Semester</th>

                    <th>Status</th>

                </tr>

                </thead>

                <tbody id="attendanceTable">

                    <!-- JavaScript will populate this -->

                </tbody>

            </table>

        </div>

    </div>

</div>

<!-- Shared App -->
<script src="js/app.js"></script>

<!-- Attendance Logic -->
<script src="js/attendance.js"></script>

</body>

</html>
